name: Draft Release

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.classifier }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            classifier: linux-x86_64
            modules: assemblies/assemblies-transform-ogr-reader-linux-x86_64,assemblies/assemblies-transform-ogr-exporter-linux-x86_64,assemblies/assemblies-vector-suite-linux-x86_64
          - os: ubuntu-latest
            classifier: linux-aarch64
            modules: assemblies/assemblies-transform-ogr-reader-linux-aarch64,assemblies/assemblies-transform-ogr-exporter-linux-aarch64,assemblies/assemblies-vector-suite-linux-aarch64
          - os: macos-15-intel
            classifier: osx-x86_64
            modules: assemblies/assemblies-transform-ogr-reader-osx-x86_64,assemblies/assemblies-transform-ogr-exporter-osx-x86_64,assemblies/assemblies-vector-suite-osx-x86_64
          - os: macos-15
            classifier: osx-aarch64
            modules: assemblies/assemblies-transform-ogr-reader-osx-aarch64,assemblies/assemblies-transform-ogr-exporter-osx-aarch64,assemblies/assemblies-vector-suite-osx-aarch64
          - os: windows-latest
            classifier: windows-x86_64
            modules: assemblies/assemblies-transform-ogr-reader-windows-x86_64,assemblies/assemblies-transform-ogr-exporter-windows-x86_64,assemblies/assemblies-vector-suite-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Checkout gdal-java-bindings
        uses: actions/checkout@v4
        with:
          repository: edigonzales/gdal-java-bindings
          ref: main
          path: .gdal-java-bindings
          fetch-depth: 1

      - name: Publish gdal-java-bindings to local Maven (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: .gdal-java-bindings
        run: ./gradlew -q publishToMavenLocal -PgdalFfmJavaToolchainVersion=23

      - name: Publish gdal-java-bindings to local Maven (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .gdal-java-bindings
        run: .\gradlew.bat -q publishToMavenLocal -PgdalFfmJavaToolchainVersion=23

      - name: Verify OGR API classes are available
        shell: bash
        run: |
          CORE_JAR="$HOME/.m2/repository/ch/so/agi/gdal-ffm-core/0.1.0-SNAPSHOT+gdal3.11.1/gdal-ffm-core-0.1.0-SNAPSHOT+gdal3.11.1.jar"
          if [[ ! -f "$CORE_JAR" ]]; then
            echo "Expected gdal-ffm-core JAR not found: $CORE_JAR"
            exit 1
          fi
          jar tf "$CORE_JAR" | grep -q 'ch/so/agi/gdal/ffm/Ogr.class' || {
            echo "gdal-ffm-core does not contain Ogr.class"
            exit 1
          }

      - name: Build ZIP packages
        shell: bash
        run: mvn -B -ntp -DskipTests -pl "${{ matrix.modules }}" -am package

      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.classifier }}
          if-no-files-found: error
          path: |
            assemblies/assemblies-transform-ogr-reader-${{ matrix.classifier }}/target/*.zip
            assemblies/assemblies-transform-ogr-exporter-${{ matrix.classifier }}/target/*.zip
            assemblies/assemblies-vector-suite-${{ matrix.classifier }}/target/*.zip

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          first_zip="$(ls dist/*.zip 2>/dev/null | head -n1 || true)"
          version="snapshot"
          if [[ -n "$first_zip" ]]; then
            base="$(basename "$first_zip")"
            parsed="$(echo "$base" | sed -E 's/^hop-(transform-ogr-reader|transform-ogr-exporter|vector-suite)-([0-9A-Za-z.+_-]+)-(linux|osx|windows).*/\2/')"
            if [[ -n "$parsed" && "$parsed" != "$base" ]]; then
              version="$parsed"
            fi
          fi
          safe_version="${version//+/-}"
          timestamp="$(date -u +%Y%m%d-%H%M)"
          short_sha="${GITHUB_SHA::7}"
          tag="auto-v${safe_version}-${timestamp}-${short_sha}"
          name="Auto Draft ${version} (${timestamp} UTC)"
          prerelease="true"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: dist/*.zip
